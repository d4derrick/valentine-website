<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will You Be My Valentine? ❤️</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff6b81, #ffcccc);
      color: white;
      padding: 50px;
      animation: backgroundAnimation 10s infinite alternate;
    }
    @keyframes backgroundAnimation {
      0% { background: #ff6b81; }
      50% { background: #ff85a1; }
      100% { background: #ffcccc; }
    }
    .question-box {
      background: rgba(255, 255, 255, 0.2);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      margin-top: 30px;
      animation: fadeIn 2s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    button {
      background-color: #ff3b6f;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      color: white;
      border-radius: 15px;
      cursor: pointer;
      margin: 10px;
      transition: transform 0.3s, background-color 0.3s;
    }
    button:hover {
      background-color: #ff2a5b;
      transform: scale(1.1);
    }
    .heart {
      font-size: 50px;
      animation: heartbeat 1.5s infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <h1>Will You Be My Valentine? ❤️</h1>
  <p class="heart">💖💘💝💞</p>
  <div class="question-box" id="question-box">
    <p>Will you be my valentine? 🥺💕</p>
    <button onclick="yesAnswer()">Yes</button>
    <button onclick="noAnswer()">No</button>
  </div>

  <audio id="background-music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
  </audio>

  <div id="surprise-message" class="hidden">
    <h2>🎆 Surprise! 🎆</h2>
    <p>Thank you for saying yes! 😍 You’re the most amazing person in my life, and I’m so lucky to have you! 💕🌹</p>
    <p>Happy Valentine’s Day, my love! ❤️❤️❤️</p>
    <p class="heart">💞💞💞💞💞💞</p>
  </div>

  <script>
    window.onload = function() {
      document.getElementById('background-music').play();
    }

    function yesAnswer() {
      document.getElementById('question-box').innerHTML = `
        <h2>I love you soooo much, Pookie! Thank you! 😘❤️💖</h2>
        <p>You’ve made my day the happiest ever! 🥰</p>
        <p class="heart">💞💞💞</p>
        <button onclick="showSurprise()">See a special surprise! 🎉</button>
      `;
    }

    function noAnswer() {
      document.getElementById('question-box').innerHTML = `
        <p>Are you sure? 😢 Please don’t break my heart... 💔</p>
        <button onclick="secondYes()">Yes</button>
        <button onclick="secondNo()">No</button>
      `;
    }

    function secondYes() {
      document.getElementById('question-box').innerHTML = `
        <h2>I love you soooo much, Pookie! Thank you! 😘❤️💖</h2>
        <p>Yay! I knew you’d come around! 🎉✨</p>
        <button onclick="showSurprise()">See a special surprise! 🎉</button>
      `;
    }

    function secondNo() {
      document.getElementById('question-box').innerHTML = `
        <p>Please reconsider! 🥺 Pretty please with a cherry on top! 🍒✨</p>
        <p>Here’s a puzzle: What’s red, cute, and loves you forever? ❤️ Answer: Me! 😍</p>
        <button onclick="yesAnswer()">Okay, fine! 😍</button>
      `;
    }

    function showSurprise() {
      document.getElementById('surprise-message').classList.remove('hidden');
      document.getElementById('question-box').innerHTML = '';
    }
  </script>

</body>
</html>
